services:
  # Backend Service
  - type: web
    name: voice-assistant-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/app.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: VOICE_SEARCH_API_KEY
        sync: false
        value: vp_live_bd43a81270399426822972bbcc4e1849122e93bb40065af7a26ddcc2ae6ba88d
      - key: PORT
        value: 5000
    healthCheckPath: /

  # Frontend Service
  - type: web
    name: voice-assistant-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: voice-assistant-backend
          property: url
