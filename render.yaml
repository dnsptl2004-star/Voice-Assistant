services:
  # Backend Service
  - type: web
    name: voice-assistant-backend
    runtime: python
    buildCommand: cd voice_assistant/backend && pip install -r requirements.txt
    startCommand: cd voice_assistant/backend && python app.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: VOICE_SEARCH_API_KEY
        sync: false
      - key: PORT
        value: 5000
    healthCheckPath: /

  # Frontend Service
  - type: web
    name: voice-assistant-frontend
    runtime: static
    buildCommand: cd voice_assistant/frontend && npm install && npm run build
    publishPath: voice_assistant/frontend/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: voice-assistant-backend
          property: url
